# Generated by: gromit policy

# Distribution channels covered by this workflow
# - Ubuntu and Debian
# - RHEL and AL
# - docker hub
# - devenv ECR
# - Cloudsmith

name: Nightly e2e tests
on:
  # Trigger tests every week day at midnight
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Image source to use (ecr or official)'
        required: false
        default: 'ecr'
        type: choice
        options:
          - ecr
          - official
      test_branch:
        description: 'Branch name for test code (if not specified, will use master)'
        required: false
        type: string
      gateway_image_tag:
        description: 'ECR Gateway image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      dashboard_image_tag:
        description: 'ECR Dashboard image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      pump_image_tag:
        description: 'ECR Pump image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      mdcb_image_tag:
        description: 'ECR MDCB image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string

env:
  VARIATION: prod
  BASE_REF: master
  IMAGE_SOURCE: {{`${{ github.event.inputs.image_source || 'ecr' }}`}}

jobs:
  security-check:
    runs-on: {{`${{ vars.DEFAULT_RUNNER }}`}}
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    steps:
      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c  # v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78  # v2
        with:
          mask-password: 'true'
      - name: Set image tags for security check
        id: security_tags
        run: |
          DASHBOARD_TAG="{{`${{ github.event.inputs.dashboard_image_tag || 'master' }}`}}"
          GATEWAY_TAG="{{`${{ github.event.inputs.gateway_image_tag || 'master' }}`}}"
          MDCB_TAG="{{`${{ github.event.inputs.mdcb_image_tag || 'master' }}`}}"
          
          echo "dashboard_image=754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-analytics:${DASHBOARD_TAG}" >> $GITHUB_OUTPUT
          echo "gateway_image=754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
          echo "mdcb_image=754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-sink:${MDCB_TAG}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner for dashboard
        id: trivy_dashboard
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # master
        with:
          image-ref: {{`${{ steps.security_tags.outputs.dashboard_image }}`}}
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Run Trivy vulnerability scanner for gateway
        if: always()
        id: trivy_gateway
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # master
        with:
          image-ref: {{`${{ steps.security_tags.outputs.gateway_image }}`}}
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Run Trivy vulnerability scanner for MDCB
        if: always()
        id: trivy_mdcb
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # master
        with:
          image-ref: {{`${{ steps.security_tags.outputs.mdcb_image }}`}}
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Send Slack notification
        if: failure() && (steps.trivy_dashboard.outcome != 'success' || steps.trivy_gateway.outcome != 'success' || steps.trivy_mdcb.outcome != 'success')
        uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001  # v1.25.0
        with:
          channel-id: '#team-ext-engineering-pr-notifications'
          slack-message: |
            *CVEs nightly scan*
            Nightly CVE scan status:
            *Tyk Analytics*: {{`${{ steps.trivy_dashboard.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}`}}
            *Tyk Gateway*: {{`${{ steps.trivy_gateway.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}`}}
            *Tyk Sink*: {{`${{ steps.trivy_mdcb.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}`}}

            Workflow run: {{`${{ github.server_url }}`}}/{{`${{ github.repository }}`}}/actions/runs/{{`${{ github.run_id }}`}}
        env:
          SLACK_BOT_TOKEN: ${{`{{ secrets.UI_SLACK_AUTH_TOKEN }}`}}

{{- $DOT := . }}
{{- range $test := .Branchvals.Tests }}
  {{- template "auto-test" (dict "dot" $DOT "test" $test "flow" "nightly") }}
{{- end }}
  report_logs:
    runs-on: {{`${{ vars.DEFAULT_RUNNER }}`}}
    needs: [test-controller-ui, test-controller-api]
    if: always()
    name: Report GH Logs on Failure
    permissions:
      actions: read
      contents: read
    steps:
      - name: Upload failed job logs
        uses: TykTechnologies/github-actions/.github/actions/gh-logs-analyser@production_branch
        with:
          github_token: ${{`{{ secrets.GITHUB_TOKEN }}`}}
          gh_logs_analyser_token: ${{`{{ secrets.GH_LOGS_ANALYSER }}`}}