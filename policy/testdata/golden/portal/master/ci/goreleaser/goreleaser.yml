      - src: default.zip
        dst: /opt/portal/default.zip
      - src: public/system
        dst: /opt/portal/public/system
      - src: ci/entrypoint.sh
        dst: /opt/portal/entrypoint.sh
        file_info:
          mode: 0775
    scripts:
      preinstall: "ci/install/before_install.sh"
      postinstall: "ci/install/post_install.sh"
      postremove: "ci/install/post_remove.sh"
    bindir: "/opt/portal"
    rpm:
      scripts:
        posttrans: ci/install/post_trans.sh
      signature:
        key_file: tyk.io.signing.key
    deb:
      signature:
        key_file: tyk.io.signing.key
        type: origin
publishers:
  - name: fips
    ids:
      - fips
    env:
      - PACKAGECLOUD_TOKEN={{ .Env.PACKAGECLOUD_TOKEN }}
    cmd: packagecloud publish --debvers "{{ .Env.DEBVERS }}" --rpmvers "{{ .Env.RPMVERS }}" tyk/portal-unstable {{ .ArtifactPath }}
  - name: std
    ids:
      - std
    env:
      - PACKAGECLOUD_TOKEN={{ .Env.PACKAGECLOUD_TOKEN }}
    cmd: packagecloud publish --debvers "{{ .Env.DEBVERS }}" --rpmvers "{{ .Env.RPMVERS }}" tyk/portal-unstable {{ .ArtifactPath }}
# This disables archives
archives:
  - formats: ['binary']
    allow_different_binary_count: true
checksum:
  disable: true
release:
  disable: true
  github:
    owner: TykTechnologies
    name: portal
  prerelease: auto
  draft: true
  name_template: "{{.ProjectName}}-v{{.Version}}"
