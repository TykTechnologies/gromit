nfpms:
  - id: fips
    vendor: "Tyk Technologies Ltd"
    homepage: "https://tyk.io"
    maintainer: "Tyk <info@tyk.io>"
    description: Developer portal for the Tyk API Gateway. Built with FIPS 140-3 compliant cryptography.
    package_name: portal-fips
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - fips-amd64
      - fips-arm64
      - fips-s390x
    formats:
      - deb
      - rpm
    contents:
      - src: "README.md"
        dst: "/opt/share/docs/portal/README.md"
      - src: "ci/install/*"
        dst: "/opt/portal/install"
      - src: ci/install/inits/systemd/system/portal.service
        dst: /lib/systemd/system/portal.service
      - src: ci/install/inits/sysv/init.d/portal
        dst: /etc/init.d/portal
      - src: portal.conf
        dst: /opt/portal/portal.conf
        type: "config|noreplace"
      - src: app/views
        dst: /opt/portal/app/views
      - src: bootstrap/views
        dst: /opt/portal/bootstrap/views
      - src: default.zip
        dst: /opt/portal/default.zip
      - src: public/system
        dst: /opt/portal/public/system
      - src: ci/entrypoint.sh
        dst: /opt/portal/entrypoint.sh
        file_info:
          mode: 0775
    scripts:
      preinstall: "ci/install/before_install.sh"
      postinstall: "ci/install/post_install.sh"
      postremove: "ci/install/post_remove.sh"
    bindir: "/opt/portal"
    rpm:
      scripts:
        posttrans: ci/install/post_trans.sh
      signature:
        key_file: tyk.io.signing.key
    deb:
      signature:
        key_file: tyk.io.signing.key
        type: origin
  - id: std
    vendor: "Tyk Technologies Ltd"
    homepage: "https://tyk.io"
    maintainer: "Tyk <info@tyk.io>"
    description: Developer portal for the Tyk API Gateway
    package_name: portal
    file_name_template: "{{ .ConventionalFileName }}"
