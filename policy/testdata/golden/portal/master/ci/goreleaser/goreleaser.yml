version: 2
before:
  hooks:
    - go mod tidy
    - ./ci/copy-framework-files.sh
builds:
  - id: fips-amd64
    flags:
      - -tags=fips
    env:
      - NOP=nop # ignore this, it is jsut to avoid a complex conditional in the templates
      - CC=gcc
      - GOFIPS140=v1.0.0
    ldflags:
      - -X github.com/TykTechnologies/portal/model/version.Version={{.Version}}
      - -X github.com/TykTechnologies/portal/model/version.Commit={{.FullCommit}}
      - -X github.com/TykTechnologies/portal/model/version.BuildDate={{.Date}}
      - -X github.com/TykTechnologies/portal/model/version.BuiltBy=goreleaser
    goos:
      - linux
    goarch:
      - amd64
    binary: dev-portal
