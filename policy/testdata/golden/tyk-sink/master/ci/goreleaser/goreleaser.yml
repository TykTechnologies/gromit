publishers:
  - name: fips
    ids:
      - fips
    env:
      - PACKAGECLOUD_TOKEN={{ .Env.PACKAGECLOUD_TOKEN }}
    cmd: packagecloud publish --debvers "{{ .Env.DEBVERS }}" --rpmvers "{{ .Env.RPMVERS }}" tyk/tyk-mdcb-unstable {{ .ArtifactPath }}
  - name: std
    ids:
      - std
