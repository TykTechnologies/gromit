nfpms:
  - id: fips
    vendor: "Tyk Technologies Ltd"
    homepage: "https://tyk.io"
    maintainer: "Tyk <info@tyk.io>"
    description: Tyk RPC server backend (bridge) Built with FIPS 140-3 compliant cryptography.
    package_name: tyk-sink-fips
    file_name_template: "{{ .ConventionalFileName }}"
    ids:
      - fips-amd64
      - fips-arm64
      - fips-s390x
    formats:
      - deb
      - rpm
    contents:
      - src: "README.md"
        dst: "/opt/share/docs/tyk-sink/README.md"
      - src: "ci/install/*"
        dst: "/opt/tyk-sink/install"
      - src: ci/install/inits/systemd/system/tyk-sink.service
        dst: /lib/systemd/system/tyk-sink.service
      - src: ci/install/inits/sysv/init.d/tyk-sink
        dst: /etc/init.d/tyk-sink
      - src: tyk_sink_sample.conf
        dst: /opt/tyk-sink/tyk_sink.conf
        type: "config|noreplace"
    scripts:
      preinstall: "ci/install/before_install.sh"
      postinstall: "ci/install/post_install.sh"
      postremove: "ci/install/post_remove.sh"
    bindir: "/opt/tyk-sink"
    rpm:
      scripts:
        posttrans: ci/install/post_trans.sh
      signature:
        key_file: tyk.io.signing.key
    deb:
      signature:
        key_file: tyk.io.signing.key
        type: origin
