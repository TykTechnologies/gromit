# Generated by: gromit policy

# Distribution channels covered by this workflow
# - Ubuntu and Debian
# - RHEL and AL
# - docker hub
# - devenv ECR
# - Cloudsmith
name: Nightly e2e tests
on:
  # Trigger tests every week day at midnight
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Image source to use (ecr or official)'
        required: false
        default: 'ecr'
        type: choice
        options:
          - ecr
          - official
      test_branch:
        description: 'Branch name for test code (if not specified, will use master)'
        required: false
        type: string
      gateway_image_tag:
        description: 'ECR Gateway image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      dashboard_image_tag:
        description: 'ECR Dashboard image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      pump_image_tag:
        description: 'ECR Pump image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      mdcb_image_tag:
        description: 'ECR MDCB image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
env:
  VARIATION: prod-variation
  BASE_REF: master
  IMAGE_SOURCE: ${{ github.event.inputs.image_source || 'ecr' }}
jobs:
  test-controller-ui:
    if: github.event.pull_request.draft == false
    runs-on: ${{ vars.DEFAULT_RUNNER }}
    outputs:
      envfiles: ${{ steps.params.outputs.envfiles }}
      pump: ${{ steps.params.outputs.pump }}
      sink: ${{ steps.params.outputs.sink }}
    steps:
      - name: Set test parameters
        uses: TykTechnologies/github-actions/.github/actions/tests/test-controller@production
        id: params
        with:
          variation: ${{ env.VARIATION }}
          base_ref: ${{ env.BASE_REF }}
          test_type: ui
  ui-tests:
    needs:
      - test-controller-ui
    runs-on: ${{ vars.DEFAULT_RUNNER }}
    env:
      XUNIT_REPORT_PATH: ${{ github.workspace}}/test-results.xml
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    strategy:
      fail-fast: false
      matrix:
        envfiles: ${{ fromJson(needs.test-controller-ui.outputs.envfiles) }}
        pump: ${{ fromJson(needs.test-controller-ui.outputs.pump) }}
        sink: ${{ fromJson(needs.test-controller-ui.outputs.sink) }}
        exclude:
          - pump: tykio/tyk-pump-docker-pub:v1.8
            sink: $ECR/tyk-sink:master
          - pump: $ECR/tyk-pump:master
            sink: tykio/tyk-mdcb-docker:v2.4
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies
      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        with:
          mask-password: 'true'
      - name: Setup tmate session only in debug mode
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3
        if: runner.debug == '1'
        with:
          detached: true
          limit-access-to-actor: true
          # Only ${{ github.actor }} has access
          # See https://github.com/mxschmitt/action-tmate#use-registered-public-ssh-keys
      - name: Fetch environment from tyk-pro
        uses: TykTechnologies/github-actions/.github/actions/tests/checkout-tyk-pro@production
        with:
          org_gh_token: ${{ steps.app-token.outputs.token }}
      - name: Set image tags
        id: set_tags
        run: |
          GATEWAY_TAG="${{ github.event.inputs.gateway_image_tag || matrix.envfiles.gwdash || 'master' }}"
          DASHBOARD_TAG="${{ github.event.inputs.dashboard_image_tag || matrix.envfiles.gwdash || 'master' }}"
          PUMP_TAG="${{ github.event.inputs.pump_image_tag || matrix.envfiles.gwdash || 'master' }}"
          MDCB_TAG="${{ github.event.inputs.mdcb_image_tag || matrix.envfiles.gwdash || 'master' }}"

          if [ "${{ env.IMAGE_SOURCE }}" == "official" ]; then
            echo "tyk_ee_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_analytics_image=tykio/tyk-dashboard:${DASHBOARD_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_pump_image=tykio/tyk-pump-docker-pub:${PUMP_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_sink_image=tykio/tyk-mdcb-docker:${MDCB_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_alfa_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_beta_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tyk_ee_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_analytics_image=${{ steps.ecr.outputs.registry }}/tyk-analytics:${DASHBOARD_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_pump_image=${{ steps.ecr.outputs.registry }}/tyk-pump:${PUMP_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_sink_image=${{ steps.ecr.outputs.registry }}/tyk-sink:${MDCB_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_alfa_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_beta_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
          fi

          echo "tags=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
      - name: Set up test environment
        uses: TykTechnologies/github-actions/.github/actions/tests/env-up@production
        timeout-minutes: 5
        id: env_up
        with:
          base_ref: ${{ matrix.envfiles.gwdash || env.BASE_REF }}
          tags: ${{ steps.set_tags.outputs.tags }}
          github_token: ${{ steps.app-token.outputs.token }}
          TYK_DB_LICENSEKEY: ${{ secrets.DASH_LICENSE }}
          TYK_MDCB_LICENSE: ${{ secrets.MDCB_LICENSE }}
        env:
          tyk_ee_image: ${{ steps.set_tags.outputs.tyk_ee_image }}
          tyk_analytics_image: ${{ steps.set_tags.outputs.tyk_analytics_image }}
          tyk_pump_image: ${{ steps.set_tags.outputs.tyk_pump_image }}
          tyk_sink_image: ${{ steps.set_tags.outputs.tyk_sink_image }}
          tyk_alfa_image: ${{ steps.set_tags.outputs.tyk_alfa_image }}
          tyk_beta_image: ${{ steps.set_tags.outputs.tyk_beta_image }}
      - name: Checkout ui test code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        env:
          TEST_BRANCH: ${{ github.event.inputs.test_branch || matrix.envfiles.gwdash }}
        with:
          repository: TykTechnologies/tyk-analytics
          path: tyk-analytics
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ env.TEST_BRANCH }}
          fetch-depth: 1
          sparse-checkout: tests/ui
      - name: Fix private module deps
        env:
          TOKEN: '${{ steps.app-token.outputs.token }}'
        run: >
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Execute UI tests
        timeout-minutes: 30
        uses: TykTechnologies/github-actions/.github/actions/tests/ui-tests@production
        id: test_execution
      - name: Upload UI test report to S3
        uses: TykTechnologies/github-actions/.github/actions/tests/ui-tests-report@production
        if: failure() && steps.test_execution.outcome != 'success' && steps.env_up.outcome == 'success'
        with:
          aws_acces_key_id: ${{ secrets.UI_AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.UI_AWS_SECRET_ACCESS_KEY }}
      - name: Generate test reports and collect logs
        uses: TykTechnologies/github-actions/.github/actions/tests/reporting@production
        if: always() && (steps.test_execution.conclusion != 'skipped')
        with:
          report_xml: 'true'
          execution_status: ${{ steps.test_execution.outcome }}
  test-controller-api:
    if: github.event.pull_request.draft == false
    runs-on: ${{ vars.DEFAULT_RUNNER }}
    outputs:
      envfiles: ${{ steps.params.outputs.envfiles }}
      pump: ${{ steps.params.outputs.pump }}
      sink: ${{ steps.params.outputs.sink }}
    steps:
      - name: Set test parameters
        uses: TykTechnologies/github-actions/.github/actions/tests/test-controller@production
        id: params
        with:
          variation: ${{ env.VARIATION }}
          base_ref: ${{ env.BASE_REF }}
          test_type: api
  api-tests:
    needs:
      - test-controller-api
    runs-on: ${{ vars.DEFAULT_RUNNER }}
    env:
      XUNIT_REPORT_PATH: ${{ github.workspace}}/test-results.xml
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    strategy:
      fail-fast: false
      matrix:
        envfiles: ${{ fromJson(needs.test-controller-api.outputs.envfiles) }}
        pump: ${{ fromJson(needs.test-controller-api.outputs.pump) }}
        sink: ${{ fromJson(needs.test-controller-api.outputs.sink) }}
        exclude:
          - pump: tykio/tyk-pump-docker-pub:v1.8
            sink: $ECR/tyk-sink:master
          - pump: $ECR/tyk-pump:master
            sink: tykio/tyk-mdcb-docker:v2.4
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies
      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        with:
          mask-password: 'true'
      - name: Setup tmate session only in debug mode
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3
        if: runner.debug == '1'
        with:
          detached: true
          limit-access-to-actor: true
          # Only ${{ github.actor }} has access
          # See https://github.com/mxschmitt/action-tmate#use-registered-public-ssh-keys
      - name: Fetch environment from tyk-pro
        uses: TykTechnologies/github-actions/.github/actions/tests/checkout-tyk-pro@production
        with:
          org_gh_token: ${{ steps.app-token.outputs.token }}
      - name: Set image tags
        id: set_tags
        run: |
          GATEWAY_TAG="${{ github.event.inputs.gateway_image_tag || matrix.envfiles.gwdash || 'master' }}"
          DASHBOARD_TAG="${{ github.event.inputs.dashboard_image_tag || matrix.envfiles.gwdash || 'master' }}"
          PUMP_TAG="${{ github.event.inputs.pump_image_tag || matrix.envfiles.gwdash || 'master' }}"
          MDCB_TAG="${{ github.event.inputs.mdcb_image_tag || matrix.envfiles.gwdash || 'master' }}"

          if [ "${{ env.IMAGE_SOURCE }}" == "official" ]; then
            echo "tyk_ee_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_analytics_image=tykio/tyk-dashboard:${DASHBOARD_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_pump_image=tykio/tyk-pump-docker-pub:${PUMP_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_sink_image=tykio/tyk-mdcb-docker:${MDCB_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_alfa_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_beta_image=tykio/tyk-gateway-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
          else
            echo "tyk_ee_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_analytics_image=${{ steps.ecr.outputs.registry }}/tyk-analytics:${DASHBOARD_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_pump_image=${{ steps.ecr.outputs.registry }}/tyk-pump:${PUMP_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_sink_image=${{ steps.ecr.outputs.registry }}/tyk-sink:${MDCB_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_alfa_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
            echo "tyk_beta_image=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
          fi

          echo "tags=${{ steps.ecr.outputs.registry }}/tyk-ee:${GATEWAY_TAG}" >> $GITHUB_OUTPUT
      - name: Set up test environment
        uses: TykTechnologies/github-actions/.github/actions/tests/env-up@production
        timeout-minutes: 5
        id: env_up
        with:
          base_ref: ${{ matrix.envfiles.gwdash || env.BASE_REF }}
          tags: ${{ steps.set_tags.outputs.tags }}
          github_token: ${{ steps.app-token.outputs.token }}
          TYK_DB_LICENSEKEY: ${{ secrets.DASH_LICENSE }}
          TYK_MDCB_LICENSE: ${{ secrets.MDCB_LICENSE }}
        env:
          tyk_ee_image: ${{ steps.set_tags.outputs.tyk_ee_image }}
          tyk_analytics_image: ${{ steps.set_tags.outputs.tyk_analytics_image }}
          tyk_pump_image: ${{ steps.set_tags.outputs.tyk_pump_image }}
          tyk_sink_image: ${{ steps.set_tags.outputs.tyk_sink_image }}
          tyk_alfa_image: ${{ steps.set_tags.outputs.tyk_alfa_image }}
          tyk_beta_image: ${{ steps.set_tags.outputs.tyk_beta_image }}
      - name: Checkout api test code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        env:
          TEST_BRANCH: ${{ github.event.inputs.test_branch || matrix.envfiles.gwdash }}
        with:
          repository: TykTechnologies/tyk-analytics
          path: tyk-analytics
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ env.TEST_BRANCH }}
          fetch-depth: 1
          sparse-checkout: tests/api
      - name: Run API tests
        uses: TykTechnologies/github-actions/.github/actions/tests/api-tests@production
        timeout-minutes: 65
        id: test_execution
        with:
          user_api_secret: ${{ steps.env_up.outputs.USER_API_SECRET }}
      - name: Generate test reports and collect logs
        uses: TykTechnologies/github-actions/.github/actions/tests/reporting@production
        if: always() && (steps.test_execution.conclusion != 'skipped')
        with:
          report_xml: 'true'
          execution_status: ${{ steps.test_execution.outcome }}
  report_logs:
    runs-on: ${{ vars.DEFAULT_RUNNER }}
    needs: [test-controller-ui, test-controller-api]
    if: always()
    name: Report GH Logs on Failure
    permissions:
      actions: read
      contents: read
    steps:
      - name: Upload failed job logs
        uses: TykTechnologies/github-actions/.github/actions/gh-logs-analyser@production
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gh_logs_analyser_token: ${{ secrets.GH_LOGS_ANALYSER }}
