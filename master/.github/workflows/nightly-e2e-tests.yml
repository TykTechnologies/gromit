# Generated by: gromit policy

# Distribution channels covered by this workflow
# - Ubuntu and Debian
# - RHEL and AL
# - docker hub
# - devenv ECR
# - Cloudsmith
name: Nightly e2e tests
on:
  # Trigger tests every week day at midnight
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      image_source:
        description: 'Image source to use (ecr or official)'
        required: false
        default: 'ecr'
        type: choice
        options:
          - ecr
          - official
      gateway_image_tag:
        description: 'Gateway image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      dashboard_image_tag:
        description: 'Dashboard image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      mdcb_image_tag:
        description: 'MDCB image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
      pump_image_tag:
        description: 'Pump image tag to use (defaults to master if not specified)'
        required: false
        default: 'master'
        type: string
env:
  VARIATION: prod
  BASE_REF: master
  IMAGE_SOURCE: ${{ github.event.inputs.image_source || 'ecr' }}
jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'
      - name: Run Trivy vulnerability scanner for dashboard
        id: trivy_dashboard
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-analytics:${{ github.event.inputs.dashboard_image_tag || 'master' }}"
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Run Trivy vulnerability scanner for gateway
        if: always()
        id: trivy_gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-ee:${{ github.event.inputs.gateway_image_tag || 'master' }}"
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Run Trivy vulnerability scanner for MDCB
        if: always()
        id: trivy_mdcb
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "754489498669.dkr.ecr.eu-central-1.amazonaws.com/tyk-sink:${{ github.event.inputs.mdcb_image_tag || 'master' }}"
          format: 'table'
          scan-type: 'image'
          exit-code: '1'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        env:
          skip-update: false
      - name: Send Slack notification
        if: failure() && (steps.trivy_dashboard.outcome != 'success' || steps.trivy_gateway.outcome != 'success' || steps.trivy_mdcb.outcome != 'success')
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: '#team-ext-engineering-pr-notifications'
          slack-message: |
            *CVEs nightly scan*
            Nightly CVE scan status:
            *Tyk Analytics*: ${{ steps.trivy_dashboard.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}
            *Tyk Gateway*: ${{ steps.trivy_gateway.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}
            *Tyk Sink*: ${{ steps.trivy_mdcb.outcome == 'success' && ':white_check_mark:' || ':no_entry_sign:' }}

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.UI_SLACK_AUTH_TOKEN }}
  test-controller-ui:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      envfiles: ${{ steps.params.outputs.envfiles }}
      pump: ${{ steps.params.outputs.pump }}
      sink: ${{ steps.params.outputs.sink }}
    steps:
      - name: Set test parameters
        uses: TykTechnologies/github-actions/.github/actions/tests/test-controller@production_branch
        id: params
        with:
          variation: ${{ env.VARIATION }}
          base_ref: ${{ env.BASE_REF }}
          test_type: ui
  ui-tests:
    needs:
      - test-controller-ui
    runs-on: ubuntu-latest-m-2
    env:
      XUNIT_REPORT_PATH: ${{ github.workspace}}/test-results.xml
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    strategy:
      fail-fast: false
      matrix:
        envfiles: ${{ fromJson(needs.test-controller-ui.outputs.envfiles) }}
        pump: ${{ fromJson(needs.test-controller-ui.outputs.pump) }}
        sink: ${{ fromJson(needs.test-controller-ui.outputs.sink) }}
        exclude:
          - pump: tykio/tyk-pump-docker-pub:v1.8
            sink: $ECR/tyk-sink:master
          - pump: $ECR/tyk-pump:master
            sink: tykio/tyk-mdcb-docker:v2.4
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'
      - name: Setup tmate session only in debug mode
        uses: mxschmitt/action-tmate@v3
        if: runner.debug == '1'
        with:
          detached: true
          limit-access-to-actor: true
          # Only ${{ github.actor }} has access
          # See https://github.com/mxschmitt/action-tmate#use-registered-public-ssh-keys
      - name: Fetch environment from tyk-pro
        uses: TykTechnologies/github-actions/.github/actions/tests/checkout-tyk-pro@production_branch
        with:
          org_gh_token: ${{ github.token }}
      - name: Set up test environment
        uses: TykTechnologies/github-actions/.github/actions/tests/env-up@production_branch
        timeout-minutes: 5
        id: env_up
        with:
          base_ref: ${{ env.BASE_REF }}
          tags: ${{ needs.goreleaser.outputs.ee_tags || needs.goreleaser.outputs.std_tags || format('{0}/tyk-ee:master', steps.ecr.outputs.registry) }}
          github_token: ${{ secrets.ORG_GH_TOKEN }}
          TYK_DB_LICENSEKEY: ${{ secrets.DASH_LICENSE }}
          TYK_MDCB_LICENSE: ${{ secrets.MDCB_LICENSE }}
        env:
          tyk_ee_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway-ee:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
          tyk_analytics_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-dashboard:{0}', github.event.inputs.dashboard_image_tag) || format('{0}/tyk-analytics:{1}', steps.ecr.outputs.registry, github.event.inputs.dashboard_image_tag || 'master') }}
          tyk_pump_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-pump-docker-pub:{0}', github.event.inputs.pump_image_tag) || format('{0}/tyk-pump:{1}', steps.ecr.outputs.registry, github.event.inputs.pump_image_tag || 'master') }}
          tyk_sink_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-mdcb-docker:{0}', github.event.inputs.mdcb_image_tag) || format('{0}/tyk-sink:{1}', steps.ecr.outputs.registry, github.event.inputs.mdcb_image_tag || 'master') }}
          tyk_alfa_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
          tyk_beta_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
      - name: Choose test code branch
        uses: TykTechnologies/github-actions/.github/actions/tests/choose-test-branch@production_branch
        with:
          test_folder: ui
          org_gh_token: ${{ secrets.ORG_GH_TOKEN }}
          branch: ${{ matrix.envfiles.gwdash }}
      - name: Fix private module deps
        env:
          TOKEN: '${{ secrets.ORG_GH_TOKEN }}'
        run: >
          git config --global url."https://${TOKEN}@github.com".insteadOf "https://github.com"
      - name: Execute UI tests
        timeout-minutes: 30
        uses: TykTechnologies/github-actions/.github/actions/tests/ui-tests@production_branch
        id: test_execution
      - name: Upload UI test report to S3
        uses: TykTechnologies/github-actions/.github/actions/tests/ui-tests-report@production_branch
        if: failure() && steps.test_execution.outcome != 'success' && steps.env_up.outcome == 'success'
        with:
          aws_acces_key_id: ${{ secrets.UI_AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.UI_AWS_SECRET_ACCESS_KEY }}
      - name: Generate test reports and collect logs
        uses: TykTechnologies/github-actions/.github/actions/tests/reporting@production_branch
        if: always() && (steps.test_execution.conclusion != 'skipped')
        with:
          report_xml: 'true'
          execution_status: ${{ steps.test_execution.outcome }}
  test-controller-api:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      envfiles: ${{ steps.params.outputs.envfiles }}
      pump: ${{ steps.params.outputs.pump }}
      sink: ${{ steps.params.outputs.sink }}
    steps:
      - name: Set test parameters
        uses: TykTechnologies/github-actions/.github/actions/tests/test-controller@production_branch
        id: params
        with:
          variation: ${{ env.VARIATION }}
          base_ref: ${{ env.BASE_REF }}
          test_type: api
  api-tests:
    needs:
      - test-controller-api
    runs-on: ubuntu-latest-m-2
    env:
      XUNIT_REPORT_PATH: ${{ github.workspace}}/test-results.xml
    permissions:
      id-token: write # This is required for requesting the Github JWT
      contents: read # This is required for actions/checkout
    strategy:
      fail-fast: false
      matrix:
        envfiles: ${{ fromJson(needs.test-controller-api.outputs.envfiles) }}
        pump: ${{ fromJson(needs.test-controller-api.outputs.pump) }}
        sink: ${{ fromJson(needs.test-controller-api.outputs.sink) }}
        exclude:
          - pump: tykio/tyk-pump-docker-pub:v1.8
            sink: $ECR/tyk-sink:master
          - pump: $ECR/tyk-pump:master
            sink: tykio/tyk-mdcb-docker:v2.4
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::754489498669:role/ecr_rw_tyk
          role-session-name: cipush
          aws-region: eu-central-1
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'
      - name: Setup tmate session only in debug mode
        uses: mxschmitt/action-tmate@v3
        if: runner.debug == '1'
        with:
          detached: true
          limit-access-to-actor: true
          # Only ${{ github.actor }} has access
          # See https://github.com/mxschmitt/action-tmate#use-registered-public-ssh-keys
      - name: Fetch environment from tyk-pro
        uses: TykTechnologies/github-actions/.github/actions/tests/checkout-tyk-pro@production_branch
        with:
          org_gh_token: ${{ github.token }}
      - name: Set up test environment
        uses: TykTechnologies/github-actions/.github/actions/tests/env-up@production_branch
        timeout-minutes: 5
        id: env_up
        with:
          base_ref: ${{ env.BASE_REF }}
          tags: ${{ needs.goreleaser.outputs.ee_tags || needs.goreleaser.outputs.std_tags || format('{0}/tyk-ee:master', steps.ecr.outputs.registry) }}
          github_token: ${{ secrets.ORG_GH_TOKEN }}
          TYK_DB_LICENSEKEY: ${{ secrets.DASH_LICENSE }}
          TYK_MDCB_LICENSE: ${{ secrets.MDCB_LICENSE }}
        env:
          tyk_ee_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway-ee:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
          tyk_analytics_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-dashboard:{0}', github.event.inputs.dashboard_image_tag) || format('{0}/tyk-analytics:{1}', steps.ecr.outputs.registry, github.event.inputs.dashboard_image_tag || 'master') }}
          tyk_pump_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-pump-docker-pub:{0}', github.event.inputs.pump_image_tag) || format('{0}/tyk-pump:{1}', steps.ecr.outputs.registry, github.event.inputs.pump_image_tag || 'master') }}
          tyk_sink_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-mdcb-docker:{0}', github.event.inputs.mdcb_image_tag) || format('{0}/tyk-sink:{1}', steps.ecr.outputs.registry, github.event.inputs.mdcb_image_tag || 'master') }}
          tyk_alfa_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
          tyk_beta_image: ${{ env.IMAGE_SOURCE == 'official' && format('tykio/tyk-gateway:{0}', github.event.inputs.gateway_image_tag) || format('{0}/tyk-ee:{1}', steps.ecr.outputs.registry, github.event.inputs.gateway_image_tag || 'master') }}
      - name: Choose test code branch
        uses: TykTechnologies/github-actions/.github/actions/tests/choose-test-branch@production_branch
        with:
          test_folder: api
          org_gh_token: ${{ secrets.ORG_GH_TOKEN }}
          branch: ${{ matrix.envfiles.gwdash }}
      - name: Run API tests
        uses: TykTechnologies/github-actions/.github/actions/tests/api-tests@production_branch
        timeout-minutes: 30
        id: test_execution
        with:
          user_api_secret: ${{ steps.env_up.outputs.USER_API_SECRET }}
      - name: Generate test reports and collect logs
        uses: TykTechnologies/github-actions/.github/actions/tests/reporting@production_branch
        if: always() && (steps.test_execution.conclusion != 'skipped')
        with:
          report_xml: 'true'
          execution_status: ${{ steps.test_execution.outcome }}
  report_logs:
    runs-on: ubuntu-latest
    needs: [test-controller-ui, test-controller-api]
    if: always()
    name: Report GH Logs on Failure
    permissions:
      actions: read
      contents: read
    steps:
      - name: Upload failed job logs
        uses: TykTechnologies/github-actions/.github/actions/gh-logs-analyser@production_branch
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          gh_logs_analyser_token: ${{ secrets.GH_LOGS_ANALYSER }}
